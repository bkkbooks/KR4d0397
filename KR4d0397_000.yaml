body:
  text: 古梅遺稿别集類三宋提要臣等謹案古梅遺稿六卷宋吳龍翰撰龍翰字式賢歙縣人咸淳鄉貢以薦授編校國史院實録院文字至元丙子鄉校請充教授尋棄去家有老樹因以古梅為號嘗為之賦而并以名其集其見劉後村詩有云詩瓢行腳半天下多謝先生棒喝功又卷末附方秋崖和百韻詩其書後內自稱門人且言以詩正法眼受記于僕又方回嘗謂其詩有驚人語樂府諸篇尤所深喜而黃山紀逰中所最契之鮑雲龍亦當時名士可知其師友之間漸漬者深故所為詩清新雋永具有思致足耐咀吟迥異浮滑陳因之習程元鳳序許其句老意新殆非虛譽集中有內丹詩外丹詩又拜李謫仙墓云經營紫河車破費十載功金鼎馴烏兔炎炎丹光紅又樓居狂吟云偃月爐深紫氣浮紅鉛黑汞六丹頭是龍翰別有得於爐火修煉之術者蓋亦俞琰之流亞也乾隆四十六年十月恭校上總纂官臣紀的臣陸錫熊臣孫士毅總校官臣陸費墀古梅遺稿序閲吳君式賢詩句老而意新咀之雋永殊非苟作聞其閉户讀書孜孜忘倦經傳子史靡不究心所以膏其墨端者有自來矣雖然學所以修身多識前言往行所以畜德德裕於身則措諸事業光明俊偉豈曰能詩而巳式賢勉之程元鳯序
