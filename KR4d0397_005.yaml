body:
  text: 古梅遺稿巻五宋吴龍翰撰拜李謫仙墓先生放曠士浩氣吞洪濛蓬池與紫閣軒葢繹相從經營紫河車破費十載功金鼎馴烏兔炎炎丹光紅一擊混沌破落地尋無蹤神仙有水解戲劇驚愚䝉當年遺劍履一鍤秋雲封我亦鑽𤣥學此心良券同朅来薦泉菊紫綺疑相逢儼如真面目曉月印寒空登采石望夫石良人戍楚竟蹉跎極目天涯嵗月多賴有江流是知己有聲似和扊扅歌登和州八公山昔年周師俘敵扵此有碑屹其上萬姓叢居一彈丸八公何在路漫漫中原北望已塵暗邊地秋来又棗丹獵獵隂風征骨亂茫茫夜月鬼聲寒老兵指㸃擒生處峴首殘碑帶淚看哭趙信菴祥雲中屹祝融峯秀出全材一鉅公銀管曽提修國史金戈㡬出䇿邉功九秋健羽横空鶚萬里威聲當道熊譚國為前冀國後汗青千古玉玲瓏麟符玉䇿總兵權手托江淮半壁天大節有闗宗社裡深謀常畫廟堂先三朝已表蟬冠像八袠終逢雞夢年不獨羊公碑尚在萬民墮淚滴湘烟秋日綿溪萬頃寒潭鏡面平數聲征雁叫霜晴滿林落葉秋風老山路黄昏人少行哭秋崖先生氣節昻斯世先生千載人可憐成白首猶只到朱輪芧取羣狙怒雪逢越犬狺方離羅織辱身世已成塵歐蘇喚不起文印屬秋崖大雅非常調正音不類俳寒江濯文思明月鏤吟懐傳業有楊晏遺書塚墓埋昔年經盼目此日罷從逰尤許為上足敢令出一頭聖涯窺浩蕩學海探深幽一瓣南豐後他師不復求吴越歸秋晚湖海歸来晚園荒菊㡬叢秋山吟骨瘦霜葉醉顔紅弔影寒溪曲懐人落月中青燈滋味永不用哭途窮座中詠蟬分韻得飢字兩翼纔乾殻已離便升喬木最髙枝銀床落葉秋風裡金掌盤敧曉露時斷續翻成無調曲悲凉做出苦吟詩前身應是夷齊輩髙臥西山自忍飢春晚野步尋花籬下蝶牽引酌酒林間鳥勸酧山色不隨春態老笛聲自起夕陽愁寓感周家敦八議姬旦衡何平秦家尚苛法四海怨商君鳳鳥時一鳴梟鳥時一鳴一鳴以為周一鳴以為秦法重滅爾族徳重潤爾身天帝厭殺伐勿使傷陽春離怨楊栁如少年春風吹得老朝為白雪花暮為浮萍草明月照妾夫夜夜闗山道明月分半光照妾顔色好空閨一十年芳容秋葉槁寳馬嘶妾夫歸對鏡畫眉雙淚垂前日夫悮娶今日妾悮夫妾貌不如夫去時故人見寄韻青年鐵硯亦曽磨壯不如人可奈何松菊猶存陶令逕煙雲不碍邵公窩吟廊緩步看修竹醉石髙眠枕緑莎一笠一蓑吾事足江湖浩蕩白鷗波樓居狂吟并引新安梅翁吴龍翰學陶隠居作樓三層平生多好書故作丹壁多好睡故作壺天多好逰故作明月滄波多好𤣥虚故作與汗漫期葢其胸中有數千巻書眼中有美少年不能好世俗之好而能好其所好如魚飲水冷暖自知然則知梅翁者誰乎故自描冩其趣云茆齋悔著市㕓間長與青山面目慳突兀小樓初結就竹床石枕臥看山樓間丹壁富藏書悮學相如賣子虚何不買牛勤敎子邵平𤓰地要人鋤覔得樓中一覺眠將身化蝶入壺天平生睡債何時足春在梅花紙帳邊湖海真成萬里逰寒風吹破黑貂裘歸来臥占樓千尺夢落滄波明月舟汗漫相期欲控鯨龜樓粗可寄閒身天敎吴猛親常健乞與商山九斛塵振衣千仞興悠哉一日看山十二回胸次誰人有丘壑便容攜酒上樓来四山如畫不勝竒朝暮烟雲都是詩樓上吟聲穿碧落天公罰我髩成絲胸次玲瓏著九垓政須時復興崔巍樓髙手可捫星斗移掇天河入酒杯諸方參遍一枯藤苦節期傳夜半燈𢎞景登樓持棒喝不容人上第三層偃月鑪深紫氣浮紅鉛黑汞六丹頭梅翁欲挹浮丘訣顓為黄山作此樓古梅遺稿巻五
