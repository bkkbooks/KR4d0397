body:
  text: 古梅遺稿卷六宋吳龍翰撰古梅賦余家有古梅突兀富饒之旁枝幹連理而茂先曽伯叔大父連武巍科曽大父嘗作連理梅賦以見意余詩人也與梅為膠漆交梅而至古標格愈不凡敬依韻扁吾窩因為之賦其詞曰欣故園之古梅兮燦珊瑚之寶樹懸瑤臺之明月兮的皪瓊花玲瓏玉蕊矧鶼比翼乎鐵幹兮乃連理而薦瑞顧此槎牙兮其仰斯逆其偃斯醉其髙斯達其低斯跂鶴膝崢嶸切切交峙蛟背突兀奔騰之勢或橫枝照水如紉蘭之湘纍或半樹粘雪如飱氊之漢使或荒山衝寒孤根回暖如采薇孤竹君之二子烈士慷慨羇臣憔悴茹鐵筋骨鏤氷腸胃乃導引其形軀兮如霧擁而雲垂如鴻飛而虎踞故能曜其夜鶴之骨而枯其秋蟬之蛻也若余者與伊納交廬其旁詔弟讀書對親奉觴呼吸清寒咽嚼清香而庶幾㵼吟筆之琳琅者乎黃山紀逰咸淳戊辰十月既望魯齋鮑雲龍古梅吳龍翰足菴宋復一來觀黃山贔屭登髙食胡麻飯掬泉飲之不火者三日從者皆無人色率不能從余三人愈清狂上丹崖萬仞之巔夜宿蓮花峯頂霜月洗空一碧萬里古梅談玄魯齋誦史足菴歌逰仙招隱之章少焉吹鐵笛賦新詩飄然有遺世獨立之興次躡煉丹峰過仙人石橋酌甘泉徜徉久之次迂路逰水簾洞踏月夜歸少憩蘭若把酒臨風對天都而酹之曰吾輩與若為熟識他年志願俱畢無忘此山昔歐陽永叔謝希深輩逰嵩山吹簫歌古調吾輩唱酬之樂似之退之登華山頂邑令百計取之得下吾輩冒萬險人迹所不能到其狂又似之然韓有詩謝有書以紀其奇也吾輩可無一語留作此山公案乎唐白雲曰余憶童丱時獲鄉先生吳公古梅鮑公魯齋宋公足菴逰黃山記喪亂之秋精神衰耗其三人余失之矣想夫其時海宇寧謐財物豐阜而諸公得以遂其幽懷逸趣乾餱肉脯每至懸崖峭壁必長繩牽挽而進遇佳處則流連忘返其雄豪有鐵笛一聲天未曉吹開三十六峯雲之句上劉後村書某謹齋沐裁書百拜獻於龍圖大學士尚書相公閣下某嘗謂臺閣之文溫潤山林之文枯稿文聲也各鳴其所以而已溫潤之文琴瑟鼗鼓笙簧鐘磬可以奉神明饗宗廟文之枯稿則如燕市夜鴻華亭曉鶴僅足堪聽而其下者則如露草寒蛩不過自鳴其困窮耳鳴其困窮豈士之得已哉然必得一代製作之主為之賞音則蛙鳴為鼓吹也昔孟郊之遇韓公楊蟠之遇歐陽公蓋以是歟抑嘗誦孟公古貌又古心作詩冥默咸池音之章臥讀楊蟠一千首乞渠秋月與春花之句而嘆曰女無正色入目為娃樂無正音入耳為韶俾郊蟠困窮之鳴不遇韓歐安得挂其名於騷墨之門乎某山林寒蹇困窮而有其鳴也請擊缶於韶濩之旁而陳之某家在屏山練水之西先曽大父從遊文公朱子之門親承謦咳文公以掃墓歸婺源曽大父上所著書説文公深嘉之某束髮以來伊吾壁中遺文雋永知味遂下董帷短韓檠推研羲文周孔之書漁獵諸子百氏太史之所録上悼千秋治亂是非之故而返歸乎性命道德之原以求其足平生之願搰搰不休雖舉子之債未償學為小詩不敢不自刻苦故夫扁舟斷岸瘦馬荒坡夜雨孤燈夕陽殘酒未嘗不悲愴其鳴然未能如郊蟠之於韓歐操觚弄翰寧不飄泛於唐求之瓢哉某聞莆中山水甲天下大塊間氣扶輿磅礴積幾千年而生先生先生道傳親燈接西山正學之光焰浚南省二魁之源流名在鼎彛詩在清廟大篇短章傳狗監而誦雞林惟見汪洋大肆奧衍宏深粹然一正如韓昌黎簡明信通歸之至理以服人心如歐陽公是為文章之司命吾道之權衡在魯之泰山在天之北斗也某生也晚不得承鉗槌親棒喝聽號令於旗鼓之下嵗在辛酉先生判花西掖監試右科某得瞻末光辱在陶鑄繩床草舍之作略溷碧瞳東閣二先生亦吹噓而剪拂之但不得殘膏剩馥一溉焦枯為歉耳某不揆謹獻小詩一編用請命于下執事惟先生涵之以天地之量恢之以造化之仁宫商焦桐青黃斷木不吝椽筆賜之品題俾黃茒白葦勃然于生意之中兔葵燕麥動搖於春風之外毋庸韓歐専美于前時而郊蟠困窮之鳴不至汨沒于後日矣蟻軀蟬翼難酬洪恩干冒威嚴俯伏俟罪不備聫句辨余素有王元風月之癖嗜吟如飴建安以來各人庭户走閽殆遍時效梅都官日以詩為課初欲馳馬羊腸百八盤間股栗汗下久則康莊按轡舒徐自若也嵗己未入京試右庠持所業參呈訥齋林竹逸諸公甚愛余學選是冬謁秋崖方先生賞余清池沈鳥影髙樹落蟬聲之聫謂余他作皆有思致庚申再投業先生深嘉嘆賞辛酉再謁後村劉先生亦沐深許不肖余自瓣香二師後屈指十二年粗有寸進何比年每出語多召閙鄉人邪殊所未喻嘗作瀟湘聫句曰一聲欸乃煙波濶千古離騷日月光或議欸乃不可對離騷余曰欸乃三老對答之聲離遭騷憂豈不可對況唐子西已有路入離騷國江通欸乃村之句明年復作瀟湘句曰天地可呼歸舴艋利名不遣涴笭箵或又議箵玉篇仄聲試取山谷詩誦之知余有所本大率詩家自有一副的當字面近挽留宇文使君聫句曰蜀儒為郡追任昉歙士呼天借寇恂或又議任昉非蜀人又不可直稱名字及改為作治字余曰今投贄廟堂或比傳説或稱姬旦恬不為怪借寇恂可作君昉決不可易他字余意用蜀儒二字見得宇文使君盛德之士多所著述為之一字又見昉傳出為新安太守本文用為字則有蓄涵活于治字昉梁人也自有吾郡以來為第一賢守用此見得宇文來吾郡作守分曉寇恂見得挽留分曉昉固非蜀恂亦非歙對偶停當十四字間本意完備若用名賢為蜀守接蜀儒作一句却又全科説新安不著癡人前不得説夢斯人之謂歟頃杜撰此語亦非強出頭而吐氣者或有可免刮垢索瘢之酷哉今後當與筆硯賦絶交書封文于劉蛻之冢泛詩於唐求之瓢以俟後世之知子雲者嗚呼有成與虧故昭氏之鼓琴也無成與虧故昭氏之不鼓琴也鼓琴不若不鼓琴也不鼓琴為善鼓琴者也余當書諸紳附方秋崖和百韻式賢和杜夔府百韻過余秋崖下大篇舂容筆力遒徑于其歸也聊復效顰方嶽拜手林壑黃昏外衡門紫翠邉火耕今已老雲卧幾何年棋斂將殘局篙回興盡船畫麟真已矣騎犢適悠然野性難拘束時情易變遷獨攜青玉杖自拾錦囊篇磊塊心逾小崎嶇智未圓别營三徑草規作一壺天紙帳嵐霏重崖花雨滴偏到頭新嵗月行腳舊山川鶴冷通房宿猿愁隔樹懸菊餐金皓露蘚當水衡錢儘懶從吾睡雖窮不受憐半生資馬磨三嘆向龍泉霜檻千林瘦春燈四壁穿陰霾知病骨寒意入詩肩竹母誰分種茶僧略具員對山徐自遣與世久無緣風月于人厚雲霄不爾便接筒通暗溜洗硯試輕煙未暇思身後何如了目前間為真富貴健是小神仙夜磬畨僧講秋帆賈客傳逺逰天漠漠危誦水湲湲墾隴時同喫分溪手自煎山厨尊土菌石鼎鄙葷羶愛此窗三尺寬于室九筵忽驚南牧馬吹過逆風鸇聖日清如許妖星竟不悛閭閻飛羽檄江漢足矛鋋哀痛絲綸詔英雄將相權旄頭森似彗駿骨詎如攣朋黨相仍斥誅求一切蠲中庸方謹獨無逸不逰畋天意憂勤甚人知性命全掄材虞稷契邁德漢文宣定亂連三箭扶顛在一賢戍兵增竈萬侍女出宫千置柵從人欲開榛自我先民勞魚潑刺版築騎蹁躚傅野親持鍤虞琴幸改絃經營聫寨壁形勝借蹄筌有備曽微此無謀莫甚焉貉緣熊道誤驥或蟻封還急務歌常武清談絶又玄腐紅銷鎧甲稚緑失桑田老子今元亮何人昔魯連三邊令按甲一飯許烹鮮鄂渚骸平壘荆州指掬舷竟孤明月約難染碧雲箋稍喜妖氛退重為逸興牽幽人甘寂寞佳客慰迍邅松桂深培養詩書肯廢捐披胸呈突兀迸齒落清漣巨迹宜瞻華靈源盍導瀍孰能當北面何事過東阡英妙奔前轍吾衰懶後鞭一言開蠖濩千里對嬋娟莫作沾泥絮端如蛻殼蟬江湖情浩蕩風雪語連綿雋永才殘藁竒溫只破氊水聲湘浦瑟梅片壽陽鈿尚覺山如畫何堪筆似椽交逰分半席談笑俯層巔共指辭章病寧無寶劑痊性根如有棘業語漫生蓮到海江千折撑空石一拳氄毛卑燕雀鬐鬛奮鯨鱣龜玉毋須藉龍駒不用韀文心聊爾爾道脈始涓涓霽月行濓水春風入孔壖訓言今具在文字肯相纒雕老秋方擊魚鰥夜不眠麥維經嵗茂穀亦得霜堅我輩寧迂濶人皆鬬小姸幾多花藹藹輕薄蝶翩翩垂世何關此留情盍審旃書林窺祕寶典册上台躔餘事輕王粲微名老鄭虔六經皆鼓吹萬象盡鎔甄不爾鸞膠續空令兔穎駢曉行溫草卷夜讀絶韋編文會吾何有詩盟詎敢専駑材諳舊路驚羽落虛弦雖乏三年艾猶能一指禪意存圖自省言到亦忘詮但使我為我不幾燕伐燕蟲魚真瑣碎鴻鵠要孤鶱國步今寧謐鄉情賴欵延地爐煨熟火野飯壓飢涎已掃秋風榻其如雨夜鵑淄澠工濫載管鮑闕周旋大雅推鄒魯長年問偓佺極知荷塢陋漸慨芰裳褰蘋聚呦呦鹿滄連跕跕鳶襟期將子共禮數莫吾愆上聖天同大中興石可鐫廟廊春郁穆岩穴草蔥芊人好鳥還好身孱氣不孱興來頻寫寄一一尚能銓己未冬賊兵癘鄂長鎗大劒為一時急著僕獨挾詩瓢過秋崖先生而問焉先生曰出車勞還杕杜勤歸詩詎埋沒於鞍馬間焉乃以詩正法眼受記於僕孔壖春風濓水霽月向上鉗槌為僕提起僕問詩而得不止於詩亦何幸也先生顧乃援筆賜和百韻品題無所不至如曰雋永才殘稿竒溫只破氊水聲湘浦瑟梅片壽陽鈿尚覺山如畫何堪筆似椽繩樞草舍之作奚敢當之先生文章衙官屈宋於人不輕許可獨不惜齒牙餘論于僕昔秦觀持所業見山谷山谷贈詩以蚌珠的皪況秦之作當時多以為許之過而秦之詩思誠由此而大發先生之成就於僕亦山谷法歟僕不敢不勉是嵗臘月既望門人吳龍翰百拜敬書于先生詩後古梅遺稿卷六
