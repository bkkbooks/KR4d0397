body:
  text: 古梅遺稿巻一宋吳龍翰撰曉發姑孰城鵑啼驚夢敧春枕花落迎風打曉窓攜杖攙先出城去角聲吹月墮寒江浙江姚樓觀水月翠滚玻璃萬頃秋長江又掛水晶毬水光月色梅邉客今夜會盟江上樓晚舟過臨平烟鐘舂起夕陽愁淼淼臨平春事幽惟有風蒲愛吟客岸邉繚亂綰行舟春晚留淮上淮山歴歴春雲澹淮水湯湯夜月輝此處杜鵑啼不到江南行客未成歸贈謁士一掬鄉心寒似月半生行跡過於雲春風滿擔詩千首是處青山留得君白紵詞吴宫烟水碧迢迢瓊樓十二凌青霄北方佳人顔如花素衣濯濯明朝霞雲母屏風珍珠箔香銷金鴨春寒薄璧月流光羅綺筵白紵舞殘月欲落君看月落夜潮平吴江濶兮越江深吴王醉越王醒嘉禾舟中天與東風便千錢買一舟嘉禾三月路陰木四山秋埜色緘詩思䳌聲替客愁烟波渺無際是處可盟鷗嘉禾沈園景物何其異虚岩人力成清池沈鳥影高樹落蟬聲花日樓臺麗香風簾幙輕我来一吟賞不惜買杯傾重陽客中愁裏重陽近他鄉酒易酤秋風詩髩短寒夜客燈孤笋笠月穿破荷衣霜打枯有懐吟未就端不為催租見劉後村先生天禄臞仙後代孫巍科㡬世屬名門千年絶學追先聖四海真儒仰後村直向天邊扶日月只從筆底轉乾坤年来諸老凋零盡惟有靈光獨自存玻璃萬頃海天秋相國如居天上頭錦帳圍山丹荔熟銀梭織水子魚逰地靈自古稱多士人物當今列上流二季一翁家學在湄洲即是蜀眉州先生莆人二子能踵其學雪碗氷甌淬筆鋒篇篇琢出玉玲瓏鶴鳴逺岫千林曉鯨展洪濤萬里雄暮雪寒梅吟思外春風芳草夢魂中詩瓢行脚半天下多謝先生棒喝功騎却青鸞上禁林岩岩聲價重於金花磚日轉瓊箋暖蓮燭星歸玉漏沈翰墨挈来三昧手絲綸畫出九重心春風已築沙堤路天上虚皇屬意深西湖曲十里風光烟水白嵯峨帝城紫霧隔笛聲吹斷蒲葉風鷺飛界破青山色湖波鱗鱗織成縠翠葢紅幢機上簇長安冨兒美少年馬行紫陌香塵撲畫舫誰家窈窕娘半額鵞黄時様粧玉手折花嬌無力花枝斜掛銀絲長隔花躊蹰意相屬稍稍談笑聞餘香夕陽西下漢水逺無計問覔雙瓊璫巫山高哉但入夢安得插翅飛其傍君不見吳姬采蓮自唱曲君王尚在舟中宿拜林和靖墓老鶴髙飛入白雲空餘殘照管孤墳清風千古鎮長在見著梅花如見君久客湖海買舟西還萬里烟波興渺然片心如在㶚橋邉歸装詩少不成擔自抝梅花湊滿船馮永之號氷壺工水墨丹青半生江海氷壺翁擔風荷雨七尺笻爛嚼扶葉紫金椹玉樓光徹十二重飽喫孤山白玉花一鑿九竅開玲瓏能鉟明月鑄雙眼故能搜索異景窺神功能穿星斗掛胸次故能神逰八極之鴻濛手撼烟雲出硯石酒酣奮筆驅雷風迴山轉海有力量頃刻鵞溪幻出白練之寒江碧玉之奇峯瀟湘洞庭忽在眼冷落烟竹蒼梧空碧天萬里渺無際但見隠隠歸飛鴻江門過雨涼如許木落瀟瀟秋滿浦月明何處起漁歌小艇人歸急搖櫓鷗沙漠漠洲渚昏無數寒鴉栖古渡景物變態雖無窮筆端有口一一吐研丹吮粉尤精竒直與王爵争毫釐寧肯没骨媚時好逸氣往往追徐熙一㸃春風㡬花卉化工權柄君所私獻之牸牛韓幹馬滕王蛺蝶僧繇魚下筆衆妙各俱足開巻錯落中珠璣顧家層樓連天起俗士那敢窺藩籬嘔心抽思何自苦乃使肌骨化作枯松枝君不見梅邉有狂客風饕雪虐寧忍飢吟軀未老貌先老不覺兩髩紛如絲靈金山觀金燈嵯峨靈金山峭壁偕天長㠝岏萬蒼翠無復敢頡頏登臨勞逺目久羈塵俗韁天風送笻屐此願今一償所喜侍老親贔屭升崇岡琪樹藹柔絲瑤草超羣芳松聲入幽懐妙樂非笙簧好鳥相勸酬醉我林中觴我吟逰仙詩客和招隠章起舞沸懽笑人影亂夕陽何妨阿堵女山北敞虚堂石池閟甘泉瓦爐騰妙香昔言山有靈金燈夜呈祥信哉華嚴經佛眉施白光澄公有妙力一笑通禪房詎知山石間而有金光藏崦嵫下朱景山氣相激揚若以色見佛扵法參與商我生事迂濶咄咄顛復狂讀書獵千古浩氣凌八荒乃欲落鬚髪掬水曹溪傍吹以無孔笛倒騎牛一場手擊混沌開有此硬脊梁指㸃生死根棒喝行諸方辛酉秋吳畫士冩神功名自有兠鍪輩榮辱寧干蓑笠翁煩作田園秋興畫短簷斜日稻花風秋崖先生招飲荷葭塢席上賦詩相公潭水清於玉翠屏四面環書屋石梯幽幽登蒼崖老樹晴烟千頃緑好花對人無俗姿春色盈盈囿虚谷歸来庭院碧參差八窓玲瓏有脩竹先生長嘯臨清流茱萸辛夷香滿洲浪呼迪輩偕春逰緑醅深注碧玉甌我醉起舞相勸酬願祝先生相業侔伊周運留侯帷幄之籌横莱公埜水之舟莫負蒼生望安石東山高卧凌清秋先生所居即相公潭京城寓居春日春城庭院柳風輕簾影玲瓏愛曉晴紅日半牕吟夢覺咿啞墻外賣花聲宫人斜碧石重重鎖墓門蘭膏㸃火照黄昏春風㡬度生芳草還似君王舊日恩春夜隔江望揚州城煙樹蕪城熨不開夜深燈火照樓臺欲披紫綺過江去月冷滄洲待鶴来數年前有小詞云微雨後落花天嬌態病懨懨怕人猜著是相思鎮日不開簾寳釵横蟬髩亂院宇待人歸儘緩移蓮步玉闌前纎手掐花鈿茲月夜與客飲梅花下一姝歌前詞復出箋徴余新作月夜梅花下開樽誰主賔梅花嬌欲語讓我白頭人娉婷樓上女無乃花中神下樓欵懽笑莫惜抛千金纎纎出素手為我彈瑤琴自言諳古調妾心合君心感君纒綿意未彈先有情妾佩明月光妾衣雲霞輕共君驂白鳳一息起玉京君看天帝女嫁與牽牛星天河萬里長鵲橋嵗一陳安得河水乾夜夜長相親君能挽天河一洗八極塵宫詞舞罷霓裳寳髻垂桃花扇底暖風吹夜深内殿重開宴手撚燈花畫翠眉秋崖先生以紅石見寄彤霞鑠石玉晶熒琢出羲之風字形却著寒松蒼石下研烟傳冩相牛經心逺堂飄飄謫仙子閉門逃世諠達哉柴桑翁心逺地乃偏羨公隠㕓市高拍前人肩園林富花木景象羅春妍翠鳥鳴高枝白魚遊深淵魚鳥欣有託吾廬興悠然詩瓢貯烟雲茶鼎烹銀蟾有此佳絶處那受名利鞭鵲尾聞妙香片心超九天淵然消萬慮流光緯三田乾坤任簸弄追蹤古偓佺持敬堂大哉紫陽箴誠為百世師心法故能傳心印㡬能提明明道統燈扵此接光輝端居儼帝臨暗室疑神窺立足千仞淵生怕傷髪膚兢兢一寸心烱烱氷雪壺脱帽藐王公無乃酒狂徒蹀𨄌漁陽鼓傲態逐刑誅我則持以敬譬如龍戀珠斷斷猫捕鼠綿綿雞哺雛守之戒勿閑意馬防馳驅層翠樓結樓書屋傍獨占林塘幽飛檐瞰寒碧照影虹霓浮層巒萬蒼翠峭𡵻生戈矛黛眉與螺髻故故含嬌羞此時樓中人片心隨白鷗風吹烏紗帽露滴紫綺裘白雲入我望逸興何悠悠沆瀣供晨餐酌以碧玉甌朝暾散朱景嚥約十二樓願言追黄鶴致身八極逰慷慨笛聲發滿樓明月秋春寒二月漫漫雪滿山羣芳空向雪中看幽亭酌酒且沈醉要為小園花餪寒凍吟座左插梅花座右横詩筆風雪墮寒肩先生方抱膝春興聞説春醪熟提壺喚客嘗乾坤一釀甕花氣百和香别吴中三年寄湖上一二知巳麥秋天氣覺清和老盡春風庭下莎晚月荒山啼蜀帝夕陽髙樹咽齊娥三年寒我滄波約一夜思君白髪多世路不堪重著脚相期何地理漁蓑古梅遺稿巻一
